<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Opinie - BSCMC.PL</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
  font-family: Orbitron;
  background: radial-gradient(circle,#000010,#020020);
  color:white;
  margin:0;
}

section{
  max-width:900px;
  margin:40px auto;
  padding:30px;
  background:rgba(0,0,30,0.85);
  border-radius:20px;
  box-shadow:0 0 40px #00ffff;
  text-align:center;
}

h2{color:#00ffff;}

input,select,textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#00ffff,#ff00ff);
  color:white;
  cursor:pointer;
}

.opinia{
  background:rgba(0,0,0,0.6);
  padding:15px;
  margin:15px 0;
  border-radius:15px;
  text-align:left;
  animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

img.avatar{
  width:40px;
  border-radius:50%;
  margin-right:10px;
  vertical-align:middle;
}

.stars{color:gold;}

.like{color:#00ff88;}
.dislike{color:#ff4444;}

.badge{
  font-size:12px;
  padding:2px 6px;
  border-radius:5px;
  background:orange;
  margin-left:5px;
}
</style>
</head>

<body>

<section>

<h2>⭐ OPINIE GRACZY</h2>

<input id="search" placeholder="🔍 Szukaj opinii...">

<br>

<button onclick="login()">🔐 Admin Panel</button>

<div id="adminStatus">🔴 Brak dostępu</div>

<hr>

<h3>➕ Dodaj opinię</h3>

<form id="form">
<input id="nick" placeholder="Nick" required>
<input id="wiek" type="number" placeholder="Wiek" required>

<select id="stars" required>
<option value="">Ocena</option>
<option value="1">⭐</option>
<option value="2">⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="5">⭐⭐⭐⭐⭐</option>
</select>

<textarea id="text" placeholder="Twoja opinia" required></textarea>

<button type="submit">📨 Wyślij</button>
</form>

<hr>

<div id="list"></div>

</section>

<script>

let admin=false;

/* 🔐 LOGIN */
function login(){
  let pass=prompt("Hasło admina:");
  if(pass==="Gimnazjalista1998"){
    admin=true;
    document.getElementById("adminStatus").innerHTML="🟢 ADMIN AKTYWNY";
    load();
  }else alert("Błędne hasło!");
}

/* 📦 LOAD */
function load(){
  let data=JSON.parse(localStorage.getItem("opinie")||"[]");

  data.sort((a,b)=>b.stars-a.stars);

  document.getElementById("list").innerHTML="";

  data.forEach((op,i)=>{

    let avatar=`https://mc-heads.net/avatar/${op.nick}`;

    let div=document.createElement("div");
    div.className="opinia";

    div.innerHTML=`
      <img class="avatar" src="${avatar}">
      <b>${op.nick}</b> (${op.wiek})
      <span class="badge">✔ opinia</span>

      <div class="stars">${"⭐".repeat(op.stars)}</div>

      <p>${op.text}</p>

      👍 ${op.likes||0}

      <br>

      <button onclick="like(${i})">👍</button>

      ${admin ? `<button onclick="del(${i})">❌ Usuń</button>` : ""}
    `;

    document.getElementById("list").appendChild(div);
  });
}

/* ➕ ADD + DISCORD */
document.getElementById("form").addEventListener("submit",async(e)=>{
  e.preventDefault();

  let data=JSON.parse(localStorage.getItem("opinie")||"[]");

  const nick=document.getElementById("nick").value;
  const wiek=document.getElementById("wiek").value;
  const stars=document.getElementById("stars").value;
  const text=document.getElementById("text").value;

  data.push({nick,wiek,stars,text,likes:0});

  localStorage.setItem("opinie",JSON.stringify(data));

  /* 🔴 DISCORD WEBHOOK */
  const webhook="WKLEJ_TUTAJ_SWÓJ_WEBHOOK";

  const payload={
    content:"📝 Nowa opinia BSCMC.PL",
    embeds:[{
      title:"Nowa opinia",
      color:5814783,
      fields:[
        {name:"Nick",value:nick,inline:true},
        {name:"Wiek",value:wiek,inline:true},
        {name:"Ocena",value:"⭐".repeat(stars),inline:true},
        {name:"Treść",value:text}
      ]
    }]
  };

  try{
    await fetch(webhook,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
  }catch(err){
    console.log("Webhook error",err);
  }

  form.reset();
  load();
});

/* 👍 LIKE */
function like(i){
  let data=JSON.parse(localStorage.getItem("opinie"));
  data[i].likes=(data[i].likes||0)+1;
  localStorage.setItem("opinie",JSON.stringify(data));
  load();
}

/* ❌ DELETE */
function del(i){
  let data=JSON.parse(localStorage.getItem("opinie"));
  data.splice(i,1);
  localStorage.setItem("opinie",JSON.stringify(data));
  load();
}

/* 🔍 SEARCH */
document.getElementById("search").addEventListener("input",function(){
  let v=this.value.toLowerCase();
  document.querySelectorAll(".opinia").forEach(e=>{
    e.style.display=e.innerText.toLowerCase().includes(v)?"block":"none";
  });
});

/* START */
load();

</script>

</body>
</html>
