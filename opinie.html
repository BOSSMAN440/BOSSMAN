<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Opinie - BSCMC.PL</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
  font-family: Orbitron;
  background: radial-gradient(circle,#000010,#020020);
  color:white;
  margin:0;
  padding:0;
}

section{
  max-width:900px;
  margin:40px auto;
  padding:30px;
  background:rgba(0,0,30,0.85);
  border-radius:20px;
  box-shadow:0 0 40px #00ffff;
  text-align:center;
}

h2{ color:#00ffff; }

input, select, textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#00ffff,#ff00ff);
  color:white;
  cursor:pointer;
  margin:5px;
}

.opinia-box{
  background:rgba(0,0,0,0.6);
  margin:15px 0;
  padding:15px;
  border-radius:15px;
  text-align:left;
  animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.stars{ color:gold; }

img.avatar{
  width:40px;
  border-radius:50%;
  vertical-align:middle;
  margin-right:10px;
}

.stats{
  display:flex;
  justify-content:space-around;
  margin-bottom:20px;
}

.like{ color:#00ff88; }
.dislike{ color:#ff4444; }

</style>
</head>

<body>

<section>

<h2>⭐ OPINIE GRACZY</h2>

<div class="stats">
  <p>📊 Opinie: <span id="count">0</span></p>
  <p>⭐ Średnia: <span id="avg">0</span></p>
</div>

<input id="search" placeholder="🔍 Szukaj opinii...">

<hr>

<h3>➕ Dodaj opinię</h3>

<form id="form">
  <input id="nick" placeholder="Nick" required>
  <input id="wiek" type="number" placeholder="Wiek" required>

  <select id="stars" required>
    <option value="">Ocena</option>
    <option value="1">⭐</option>
    <option value="2">⭐⭐</option>
    <option value="3">⭐⭐⭐</option>
    <option value="4">⭐⭐⭐⭐</option>
    <option value="5">⭐⭐⭐⭐⭐</option>
  </select>

  <textarea id="text" placeholder="Twoja opinia..." required></textarea>

  <button type="submit">📨 Wyślij</button>
</form>

<hr>

<button onclick="adminLogin()">🔐 Admin</button>

<div id="list"></div>

</section>

<script>
let admin=false;

/* LOAD */
function load(){
  let data = JSON.parse(localStorage.getItem("opinie") || "[]");

  let sum=0;
  document.getElementById("list").innerHTML="";

  data.forEach((op,i)=>{
    sum += Number(op.stars);

    let avatar = `https://mc-heads.net/avatar/${op.nick}`;

    let div = document.createElement("div");
    div.className="opinia-box";

    div.innerHTML=`
      <img class="avatar" src="${avatar}">
      <b>${op.nick}</b> (${op.wiek} lat)

      <div class="stars">${"⭐".repeat(op.stars)}</div>
      <p>${op.text}</p>

      <span class="like">👍 ${op.likes||0}</span>
      <span class="dislike"> 👎 ${op.dislikes||0}</span>

      <br>

      <button onclick="like(${i})">👍</button>
      <button onclick="dislike(${i})">👎</button>

      ${admin ? `<button onclick="del(${i})">❌ Usuń</button>` : ""}
    `;

    document.getElementById("list").appendChild(div);
  });

  document.getElementById("count").innerText=data.length;
  document.getElementById("avg").innerText=data.length?(sum/data.length).toFixed(1):0;
}

/* ADD */
document.getElementById("form").addEventListener("submit",e=>{
  e.preventDefault();

  let data=JSON.parse(localStorage.getItem("opinie")||"[]");

  data.push({
    nick:nick.value,
    wiek:wiek.value,
    stars:stars.value,
    text:text.value,
    likes:0,
    dislikes:0,
    reaction:null
  });

  localStorage.setItem("opinie",JSON.stringify(data));
  form.reset();
  load();
});

/* LIKE */
function like(i){
  let data=JSON.parse(localStorage.getItem("opinie"));

  if(!data[i].reaction) data[i].reaction=null;

  if(data[i].reaction==="like"){
    data[i].likes=Math.max((data[i].likes||0)-1,0);
    data[i].reaction=null;
  } else {
    if(data[i].reaction==="dislike"){
      data[i].dislikes=Math.max((data[i].dislikes||0)-1,0);
    }
    data[i].likes=(data[i].likes||0)+1;
    data[i].reaction="like";
  }

  localStorage.setItem("opinie",JSON.stringify(data));
  load();
}

/* DISLIKE */
function dislike(i){
  let data=JSON.parse(localStorage.getItem("opinie"));

  if(!data[i].reaction) data[i].reaction=null;

  if(data[i].reaction==="dislike"){
    data[i].dislikes=Math.max((data[i].dislikes||0)-1,0);
    data[i].reaction=null;
  } else {
    if(data[i].reaction==="like"){
      data[i].likes=Math.max((data[i].likes||0)-1,0);
    }
    data[i].dislikes=(data[i].dislikes||0)+1;
    data[i].reaction="dislike";
  }

  localStorage.setItem("opinie",JSON.stringify(data));
  load();
}

/* DELETE */
function del(i){
  let data=JSON.parse(localStorage.getItem("opinie"));
  data.splice(i,1);
  localStorage.setItem("opinie",JSON.stringify(data));
  load();
}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
  let v=this.value.toLowerCase();
  document.querySelectorAll(".opinia-box").forEach(b=>{
    b.style.display=b.innerText.toLowerCase().includes(v)?"block":"none";
  });
});

/* ADMIN */
function adminLogin(){
  let p=prompt("Hasło:");
  if(p==="admin123"){
    admin=true;
    alert("Admin aktywny");
    load();
  }
}

/* START */
load();
</script>

</body>
</html>
