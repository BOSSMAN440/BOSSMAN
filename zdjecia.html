<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSCMC.PL - Galeria</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Orbitron', sans-serif;
  color:#fff;
  min-height:100vh;
  background: radial-gradient(circle at center, #000010 0%, #020020 100%);
  overflow-x:hidden;
  padding:40px 20px;
}

/* gwiazdy */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background:url('https://www.transparenttextures.com/patterns/stardust.png');
  opacity:0.2;
  z-index:0;
  pointer-events:none;
}

/* HEADER */
header {
  text-align:center;
  margin-bottom:40px;
  position:relative;
  z-index:1;
}

header h1 {
  font-size:3.5em;
  background: linear-gradient(90deg,#00ffff,#ff00ff,#00ffff);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:gradientAnim 6s linear infinite;
  text-shadow:0 0 20px #00ffff,0 0 40px #ff00ff;
}

@keyframes gradientAnim {
  0%{background-position:0%}
  100%{background-position:300%}
}

/* SEKCJE */
.section-title {
  text-align:center;
  font-size:2.2em;
  margin:70px 0 25px;
  color:#00ffff;
  text-shadow:0 0 15px #00ffff;
  position:relative;
  z-index:1;
}

/* GALERIA */
.gallery {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:30px;
  max-width:1100px;
  margin:0 auto;
  position:relative;
  z-index:1;
}

.gallery img {
  width:100%;
  height:350px;
  object-fit:cover;
  border-radius:22px;
  box-shadow:0 0 25px #00ffff, 0 0 50px #ff00ff;
  transition:0.35s ease;
  border:2px solid rgba(0,255,255,0.2);
  cursor:pointer;
}

.gallery img:hover {
  transform:scale(1.05);
  box-shadow:0 0 70px #00ffff, 0 0 100px #ff00ff;
}

/* LIGHTBOX */
#lightbox {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#lightbox img {
  max-width:90%;
  max-height:90%;
  border-radius:20px;
  box-shadow:0 0 80px #00ffff;
}

/* MOBILE */
@media (max-width:768px) {
  .gallery {
    grid-template-columns:1fr;
  }

  .gallery img {
    height:260px;
  }

  header h1 {
    font-size:2.5em;
  }
}
</style>
</head>

<body>

<header>
  <h1>GALERIA BSCMC.PL</h1>
</header>

<div class="section-title">SURVIVAL – DZIAŁKI</div>
<div class="gallery">
  <img src="https://i.postimg.cc/tJdcSPrY/C4D0BA76-580F-4906-9794-E87E477D4186.png">
  <img src="https://i.postimg.cc/cCJ32Ghc/93FF200E-98A7-4853-9B07-3CCDFA13F10A.png">
  <img src="https://i.postimg.cc/5tMC1Cp1/8FB102E7-024C-4980-B03B-893FE7E9C3F3.png">
  <img src="https://i.postimg.cc/gcBLj5N9/30670A84-B2D4-41B3-BD0C-C26D8FBB02BD.png">
  <img src="https://i.postimg.cc/bJwdNHnP/267F0CE7-4E91-4E43-9ECA-BAFD7207CBEC.png">
</div>

<div class="section-title">CHUNKLOCK</div>
<div class="gallery">
  <img src="https://i.postimg.cc/pXRddVhf/A6125AA4-9420-42F1-A406-DAE5541D54F6.png">
  <img src="https://i.postimg.cc/8znkwhyX/887B4DCE-AF4B-43BB-82A7-408BFFDA278B.png">
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img">
</div>

<script>
const images = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

images.forEach(img => {
  img.addEventListener('click', () => {
    lightbox.style.display = 'flex';
    lightboxImg.src = img.src;
  });
});
</script>

</body>
</html>
