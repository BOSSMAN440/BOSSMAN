<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSCMC.PL - Kosmiczny Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    min-height: 100vh;
    background: radial-gradient(circle at center, #000010 0%, #020020 100%);
    overflow-x: hidden;
    position: relative;
  }

  /* Gwiezdne tło */
  body::before {
    content:"";
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity:0.2;
    z-index:0;
    pointer-events:none;
  }

  /* Header */
  header {
    text-align:center;
    padding:60px 20px 20px 20px;
    position:relative; z-index:1;
  }
  header h1 {
    font-size:5em;
    background: linear-gradient(90deg,#00ffff,#ff00ff,#00ffff);
    background-size:300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:gradientAnim 6s linear infinite;
    text-shadow:0 0 20px #00ffff,0 0 40px #ff00ff;
  }
  @keyframes gradientAnim {0%{background-position:0%}100%{background-position:300%}}
  header p {
    font-size:1.5em;
    margin-top:10px;
    color:#00ffff;
    text-shadow:0 0 10px #00ffff;
  }

  /* NAV */
  nav {
    display:flex;
    justify-content:center;
    gap:20px;
    margin:30px 0;
    flex-wrap:wrap;
    z-index:1;
    position:relative;
    flex-direction:column;
    align-items:center;
  }

  .nav-row {
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
  }

  nav a {
    position:relative;
    padding:15px 30px;
    border-radius:20px;
    text-decoration:none;
    font-weight:bold;
    color:#fff;
    font-size:1.2em;
    background: linear-gradient(135deg, #ff00ff, #00ffff);
    box-shadow:0 0 15px #00ffff, 0 0 30px #ff00ff;
    transition: all 0.3s ease-in-out;
    overflow:hidden;
  }
  nav a:hover {
    transform: scale(1.1);
    box-shadow:0 0 50px #00ffff,0 0 100px #ff00ff;
  }

  .social-label {
    margin-top:12px;
    font-size:1.4em;
    color:#00ffff;
    text-shadow:0 0 10px #00ffff;
    letter-spacing:3px;
  }

  /* Action buttons */
  .action-buttons {
    display:flex;
    flex-direction:column;
    gap:20px;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    margin:40px 0;
    z-index:1;
    position:relative;
  }
  .top-row {
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .top-row button, .bottom-row button {
    padding:20px 40px;
    font-size:1.2em;
    border:none;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
    color:#fff;
    background: linear-gradient(135deg,#00ffff,#ff00ff);
    box-shadow:0 0 20px #00ffff,0 0 40px #ff00ff;
    transition: all 0.3s;
    position:relative;
  }
  .top-row button:hover, .bottom-row button:hover {
    transform: scale(1.1);
    box-shadow:0 0 60px #00ffff,0 0 120px #ff00ff;
  }

  .particle {
    position:absolute;
    width:6px;
    height:6px;
    background:#00ffff;
    border-radius:50%;
    pointer-events:none;
    opacity:0;
    z-index:2;
    animation:particleAnim 0.8s forwards;
  }
  @keyframes particleAnim {
    0%{opacity:1; transform:translate(0,0) scale(1);}
    100%{opacity:0; transform:translate(var(--x), var(--y)) scale(0);}
  }

  .bottom-row { margin-top:0; }

  /* Features */
  .features {
    max-width:1000px;
    margin:80px auto;
    text-align:center;
    position:relative; z-index:1;
    background: linear-gradient(270deg,#00001a,#000022);
    background-size:600% 600%;
    animation:sectionGradient 20s ease infinite;
    border-radius:20px;
    padding:50px 20px;
  }
  @keyframes sectionGradient{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }

  .features h2 {
    font-size:2.5em;
    background: linear-gradient(90deg,#00ffff,#ff00ff,#00ffff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:gradientAnim 6s linear infinite;
    margin-bottom:40px;
    text-shadow:0 0 15px #00ffff,0 0 30px #ff00ff;
  }

  .features-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
  }

  .feature {
    background: rgba(0,0,20,0.7);
    padding:30px 20px;
    border-radius:20px;
    box-shadow:0 0 20px #00ffff;
    transition: all 0.3s;
  }
  .feature:hover {
    transform: scale(1.05);
    box-shadow:0 0 60px #ff00ff,0 0 80px #00ffff;
  }

  .feature h3 {
    color:#00ffff;
    font-size:1.5em;
    margin-bottom:15px;
    text-shadow:0 0 10px #00ffff;
  }
  .feature p { color:#ccc; line-height:1.5em; font-size:1em; }

  /* Leaderboard */
  .leaderboard {
    max-width:500px;
    margin:60px auto;
    background: rgba(0,0,30,0.85);
    border-radius:25px;
    padding:30px;
    box-shadow:0 0 60px #ff00ff,0 0 120px #00ffff;
    position:relative; z-index:1;
    animation:sectionGradient 20s ease infinite;
  }

  .leaderboard h3 {
    text-align:center;
    color:#00ffff;
    font-size:2em;
    margin-bottom:25px;
    text-shadow:0 0 20px #00ffff,0 0 40px #ff00ff;
  }

  .player {
    display:flex;
    justify-content:space-between;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    font-weight:bold;
    transition:all 0.3s;
  }
  .player:hover { background: linear-gradient(90deg,#00ffff,#ff00ff); transform: scale(1.02); }

  .gold { background: linear-gradient(90deg,#FFD700,#FFA500); color:#000; }
  .silver { background: linear-gradient(90deg,#C0C0C0,#A9A9A9); color:#000; }
  .bronze { background: linear-gradient(90deg,#CD7F32,#8B4513); color:#fff; }

  footer {
    text-align:center;
    padding:20px;
    font-size:0.85em;
    background: rgba(0,0,20,0.8);
    color:#aaa;
    margin-top:80px;
    z-index:1;
    position:relative;
  }

  @media(max-width:768px) {
    .nav-row { flex-direction:column; }
    .top-row { flex-direction:column; }
  }
</style>
</head>

</nav>

</body>
</html>
