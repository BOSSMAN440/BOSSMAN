<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSCMC.PL - Kosmiczny Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family: 'Orbitron', sans-serif;
  color: #fff;
  min-height: 100vh;
  background: radial-gradient(circle at center, #000010 0%, #020020 100%);
  overflow-x: hidden;
  position: relative;
}

/* ⭐ ANIMOWANE TŁO OBRAZKÓW */
.bg-animation {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: 0;
}

.bg-animation img {
  position: absolute;
  width: 120px;
  opacity: 0.6;
  pointer-events: none;
  filter: drop-shadow(0 0 10px #00ffff);
}

/* gwiazdy */
body::before {
  content:"";
  position:absolute;
  inset:0;
  background:url('https://www.transparenttextures.com/patterns/stardust.png');
  opacity:0.2;
  z-index:0;
  pointer-events:none;
}

/* HEADER */
header {
  text-align:center;
  padding:60px 20px 20px;
  position:relative;
  z-index:2;
}

header h1 {
  font-size:5em;
  background: linear-gradient(90deg,#00ffff,#ff00ff,#00ffff);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:gradientAnim 6s linear infinite;
  text-shadow:0 0 20px #00ffff,0 0 40px #ff00ff;
}

@keyframes gradientAnim {
  0%{background-position:0%}
  100%{background-position:300%}
}

header p {
  font-size:1.5em;
  margin-top:10px;
  color:#00ffff;
  text-shadow:0 0 10px #00ffff;
}

/* wszystko nad tłem */
section, div, header, footer {
  position: relative;
  z-index: 2;
}

/* reszta Twojego stylu bez zmian */
.section-title {
  text-align:center;
  font-size:1.8em;
  margin:40px 0 15px;
  color:#00ffff;
  text-shadow:0 0 15px #00ffff;
}

.btn-row {
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.btn {
  display:inline-block;
  padding:14px 28px;
  border-radius:18px;
  text-decoration:none;
  font-weight:bold;
  color:#fff;
  font-size:1.1em;
  background: linear-gradient(135deg,#00ffff,#ff00ff);
  box-shadow:0 0 15px #00ffff,0 0 30px #ff00ff;
  transition:0.3s ease;
}

.btn:hover {
  transform:scale(1.1);
  box-shadow:0 0 50px #00ffff,0 0 100px #ff00ff;
}

.features {
  max-width:1000px;
  margin:80px auto;
  text-align:center;
  background: linear-gradient(270deg,#00001a,#000022);
  background-size:600% 600%;
  animation:sectionGradient 20s ease infinite;
  border-radius:20px;
  padding:50px 20px;
}

@keyframes sectionGradient {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.features-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}

.feature {
  background: rgba(0,0,20,0.7);
  padding:30px 20px;
  border-radius:20px;
  box-shadow:0 0 20px #00ffff;
  transition:0.3s;
}

.feature:hover {
  transform:scale(1.05);
  box-shadow:0 0 60px #ff00ff,0 0 80px #00ffff;
}

.leaderboard {
  max-width:500px;
  margin:60px auto;
  background: rgba(0,0,30,0.85);
  border-radius:25px;
  padding:30px;
  box-shadow:0 0 60px #ff00ff,0 0 120px #00ffff;
}

.player {
  display:flex;
  justify-content:space-between;
  padding:15px;
  margin-bottom:10px;
  border-radius:15px;
}

.gold { background: linear-gradient(90deg,#FFD700,#FFA500); color:#000; }
.silver { background: linear-gradient(90deg,#C0C0C0,#A9A9A9); color:#000; }
.bronze { background: linear-gradient(90deg,#CD7F32,#8B4513); color:#fff; }

footer {
  text-align:center;
  padding:20px;
  font-size:0.85em;
  background: rgba(0,0,20,0.8);
  color:#aaa;
  margin-top:80px;
}

/* żeby canvas/animacja była pod wszystkim */
</style>
</head>

<body>

<!-- ⭐ TŁO Z OBRAZKAMI -->
<div class="bg-animation">
  <img src="https://i.postimg.cc/7h4t7tRc/8D3B7206-9D1C-4BCA-A73F-B2083468965C.png">
  <img src="https://i.postimg.cc/Rh3LGnVR/6E324A66-BD7A-4575-BCAA-57A532873B52.png">
  <img src="https://i.postimg.cc/Cx06Mmxt/3358C661-FE24-4F3A-9FF0-E7A2C478B492.png">
  <img src="https://i.postimg.cc/R0RyLwD7/1851A854-A4A1-4B9E-93C2-00472FFFE47A.png">
  <img src="https://i.postimg.cc/tJdcSPrY/C4D0BA76-580F-4906-9794-E87E477D4186.png">
  <img src="https://i.postimg.cc/cCJ32Ghc/93FF200E-98A7-4853-9B07-3CCDFA13F10A.png">
  <img src="https://i.postimg.cc/5tMC1Cp1/8FB102E7-024C-4980-B03B-893FE7E9C3F3.png">
  <img src="https://i.postimg.cc/j5BtbTLq/A9B0B6D0-CC80-48BA-B205-EF5D1127C151.png">
  <img src="https://i.postimg.cc/bJwdNHnP/267F0CE7-4E91-4E43-9ECA-BAFD7207CBEC.png">
</div>

<header>
  <h1>BSCMC.PL</h1>
  <p>Wersja: <strong>1.21.10</strong></p>
</header>

<!-- (RESZTA TWOJEJ STRONY ZOSTAJE BEZ ZMIAN) -->

<script>
const images = document.querySelectorAll(".bg-animation img");

const data = Array.from(images).map(img => ({
  el: img,
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  vx: (Math.random() - 0.5) * 2,
  vy: (Math.random() - 0.5) * 2
}));

function animate() {
  const w = window.innerWidth;
  const h = window.innerHeight;

  data.forEach(obj => {
    obj.x += obj.vx;
    obj.y += obj.vy;

    const rect = obj.el.getBoundingClientRect();
    const size = 120;

    if (obj.x <= 0 || obj.x + size >= w) obj.vx *= -1;
    if (obj.y <= 0 || obj.y + size >= h) obj.vy *= -1;

    obj.el.style.left = obj.x + "px";
    obj.el.style.top = obj.y + "px";
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
