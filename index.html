<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSCMC.PL - Kosmiczny Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Orbitron', sans-serif;
  color: #fff;
  min-height: 100vh;
  background: radial-gradient(circle at center, #000010 0%, #020020 100%);
  overflow:hidden;
}

/* ⭐ TŁO ANIMOWANE */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.bg img {
  position: absolute;
  width: 140px;
  height: auto;
  opacity: 0.7;
  pointer-events: none;
  filter: drop-shadow(0 0 10px #00ffff);
}

/* wszystko na wierzchu */
.content {
  position: relative;
  z-index: 2;
}

/* HEADER */
header {
  text-align:center;
  padding:60px 20px 20px;
}

header h1 {
  font-size:5em;
  background: linear-gradient(90deg,#00ffff,#ff00ff,#00ffff);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:gradientAnim 6s linear infinite;
}

@keyframes gradientAnim {
  0%{background-position:0%}
  100%{background-position:300%}
}

header p {
  font-size:1.5em;
  color:#00ffff;
}

/* BUTTONY */
.section-title {
  text-align:center;
  margin:40px 0 15px;
  color:#00ffff;
}

.btn-row {
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.btn {
  padding:14px 28px;
  border-radius:18px;
  text-decoration:none;
  color:#fff;
  background: linear-gradient(135deg,#00ffff,#ff00ff);
  box-shadow:0 0 15px #00ffff,0 0 30px #ff00ff;
}

/* FEATURES */
.features {
  max-width:1000px;
  margin:60px auto;
  padding:40px;
  background: rgba(0,0,20,0.6);
  border-radius:20px;
}

.features-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.feature {
  background: rgba(0,0,30,0.7);
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px #00ffff;
}

/* LEADERBOARD */
.leaderboard {
  max-width:500px;
  margin:60px auto;
  padding:20px;
  background: rgba(0,0,30,0.8);
  border-radius:20px;
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  color:#aaa;
}
</style>
</head>

<body>

<!-- ⭐ TŁO -->
<div class="bg">
  <img src="https://i.postimg.cc/7h4t7tRc/8D3B7206-9D1C-4BCA-A73F-B2083468965C.png">
  <img src="https://i.postimg.cc/Rh3LGnVR/6E324A66-BD7A-4575-BCAA-57A532873B52.png">
  <img src="https://i.postimg.cc/Cx06Mmxt/3358C661-FE24-4F3A-9FF0-E7A2C478B492.png">
  <img src="https://i.postimg.cc/R0RyLwD7/1851A854-A4A1-4B9E-93C2-00472FFFE47A.png">
  <img src="https://i.postimg.cc/tJdcSPrY/C4D0BA76-580F-4906-9794-E87E477D4186.png">
  <img src="https://i.postimg.cc/cCJ32Ghc/93FF200E-98A7-4853-9B07-3CCDFA13F10A.png">
  <img src="https://i.postimg.cc/5tMC1Cp1/8FB102E7-024C-4980-B03B-893FE7E9C3F3.png">
  <img src="https://i.postimg.cc/j5BtbTLq/A9B0B6D0-CC80-48BA-B205-EF5D1127C151.png">
  <img src="https://i.postimg.cc/bJwdNHnP/267F0CE7-4E91-4E43-9ECA-BAFD7207CBEC.png">
</div>

<div class="content">

<header>
  <h1>BSCMC.PL</h1>
  <p>Wersja: 1.21.10</p>
</header>

<div class="section-title">TRYBY</div>
<div class="btn-row">
  <a class="btn" href="survival.html">SURVIVAL</a>
  <a class="btn" href="chunklock.html">CHUNKLOCK</a>
</div>

<section class="features">
  <h2 style="text-align:center;color:#00ffff;margin-bottom:20px;">DLACZEGO MY?</h2>
  <div class="features-grid">
    <div class="feature">Aktywna administracja</div>
    <div class="feature">Eventy</div>
    <div class="feature">Custom systemy</div>
    <div class="feature">Bezpieczeństwo</div>
  </div>
</section>

<footer>
  © 2026 BSCMC.PL
</footer>

</div>

<script>
const images = document.querySelectorAll(".bg img");

const items = [];

images.forEach(img => {
  const size = 120;

  const obj = {
    el: img,
    x: Math.random() * (window.innerWidth - size),
    y: Math.random() * (window.innerHeight - size),
    vx: (Math.random() * 2 + 1) * (Math.random() > 0.5 ? 1 : -1),
    vy: (Math.random() * 2 + 1) * (Math.random() > 0.5 ? 1 : -1),
    size
  };

  img.style.width = size + "px";
  items.push(obj);
});

function animate() {
  const w = window.innerWidth;
  const h = window.innerHeight;

  items.forEach(o => {
    o.x += o.vx;
    o.y += o.vy;

    if (o.x <= 0 || o.x + o.size >= w) o.vx *= -1;
    if (o.y <= 0 || o.y + o.size >= h) o.vy *= -1;

    o.el.style.left = o.x + "px";
    o.el.style.top = o.y + "px";
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
