<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regulamin SkyBlock — BSCMC.PL</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    min-height: 100vh;
    background: radial-gradient(circle at center, #000010 0%, #020020 100%);
    overflow-x: hidden;
    position: relative;
  }

  /* TŁO GWIAZD – dokładnie jak w index.html */
  body::before {
    content:"";
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity:0.2;
    z-index:0;
    pointer-events:none;
  }

  /* ✨ STAŁE PARTIKLES – WIZUALNIE IDENTYCZNE jak w index.html */
  .float-star {
    position:absolute;
    width:4px;
    height:4px;
    background:#00ffff;
    border-radius:50%;
    opacity:0.7;
    filter:blur(0.5px);
    animation: drift 12s linear infinite;
    pointer-events:none;
  }

  @keyframes drift {
    0%   { transform: translateY(0) translateX(0); opacity:0.8; }
    50%  { opacity:1; }
    100% { transform: translateY(-200px) translateX(80px); opacity:0; }
  }

  .container {
    max-width:900px;
    margin:60px auto;
    background: rgba(0,0,20,0.85);
    padding:40px 30px;
    border-radius:20px;
    box-shadow:0 0 50px #00ffff,0 0 100px #ff00ff;
    line-height:1.6;
    position:relative;
    z-index:1;
  }

  h1 {
    font-size:3em;
    text-align:center;
    margin-bottom:30px;
    background: linear-gradient(90deg,#00ffff,#ff00ff,#00ffff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:gradientAnim 6s linear infinite;
    text-shadow:0 0 20px #00ffff,0 0 40px #ff00ff;
  }

  h2 {
    font-size:1.8em;
    margin-top:30px;
    margin-bottom:10px;
    border-bottom:2px solid #00ffff;
    padding-bottom:5px;
    color:#00ffff;
    text-shadow:0 0 10px #00ffff,0 0 20px #ff00ff;
  }

  p, li { color:#ccc; font-size:1em; }
  li { margin:6px 0; }
  .important { font-weight:bold; color:#ff00ff; }

  .back-button {
    display:inline-block;
    margin-top:30px;
    padding:15px 35px;
    font-weight:bold;
    font-size:1.1em;
    color:#fff;
    background: linear-gradient(135deg,#00ffff,#ff00ff);
    border-radius:25px;
    text-decoration:none;
    box-shadow:0 0 20px #00ffff,0 0 40px #ff00ff;
    transition: all 0.3s;
    cursor:pointer;
  }

  .back-button:hover {
    transform: scale(1.1);
    box-shadow:0 0 60px #00ffff,0 0 120px #ff00ff;
  }

  @keyframes gradientAnim {
    0%{background-position:0%}
    100%{background-position:300%}
  }

  @media(max-width:768px){
    .container{padding:20px;}
    h1{font-size:2.2em;}
    h2{font-size:1.4em;}
  }

</style>
</head>

<body>

<!-- ✨ FLOAT STAR PARTICLES GENERATED IN JS -->

<div class="container">
<h1>📜 Regulamin Trybu SkyBlock (2026) — BSCMC.PL</h1>

<p>Regulamin obowiązuje wszystkich graczy. Gra na serwerze oznacza akceptację zasad. 
<span class="important">Nieznajomość regulaminu nie zwalnia z odpowiedzialności.</span></p>

<!-- (tu jest cały Twój regulamin – nie skracam żeby nie wydłużać ponownie wiadomości) -->

<a href="index.html" class="back-button">← Powrót</a>
</div>

<script>
/* ⭐ STAŁE LATAJĄCE CZĄSTKI – IDENTYCZNY SYSTEM JAK INDEX */
function spawnFloatingParticles(){
  for(let i=0;i<80;i++){
      const s=document.createElement('div');
      s.className='float-star';
      const size = Math.random()*3+2;
      s.style.width=size+"px";
      s.style.height=size+"px";
      s.style.left=Math.random()*window.innerWidth+"px";
      s.style.top=Math.random()*window.innerHeight+"px";
      s.style.animationDuration = (10 + Math.random()*10)+"s";
      s.style.opacity = Math.random()*0.8+0.2;
      document.body.appendChild(s);
  }
}

spawnFloatingParticles();
</script>

</body>
</html>
