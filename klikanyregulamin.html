<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regulaminy BSCMC.PL</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: radial-gradient(circle at center, #000010 0%, #020020 100%);
    color: #fff;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 80px;
  }

  /* Delikatna tekstura gwiezdna */
  body::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url("https://www.transparenttextures.com/patterns/stardust.png");
    opacity: 0.2;
    z-index: 0;
  }

  /* ✨ NEON FLOAT PARTICLES – identyczne jak na stronie głównej */
  .float-star {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #00ffff;
    border-radius: 50%;
    opacity: 0.7;
    filter: blur(0.8px);
    animation: drift 12s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes drift {
    0%   { transform: translateY(0) translateX(0); opacity: 0.7; }
    50%  { opacity: 1; }
    100% { transform: translateY(-200px) translateX(80px); opacity: 0; }
  }

  /* --- KARTA --- */
  .container {
    max-width: 700px;
    background: rgba(0, 0, 25, 0.85);
    padding: 35px 40px;
    border-radius: 20px;
    box-shadow: 0 0 35px #00ffff88, 0 0 80px #ff00ff44;
    text-align: center;
    position: relative;
    z-index: 1;
    backdrop-filter: blur(5px);
  }

  h1 {
    font-size: 2.6em;
    margin-bottom: 35px;
    background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 6s linear infinite;
    text-shadow: 0 0 20px #00ffff55;
  }

  @keyframes glow {
    0% { background-position: 0%; }
    100% { background-position: 300%; }
  }

  /* --- Przyciski --- */
  .button {
    display: inline-block;
    margin: 15px;
    padding: 15px 35px;
    font-size: 1.2em;
    font-weight: bold;
    color: #fff;
    text-decoration: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #00ffff, #ff00ff);
    box-shadow: 0 0 20px #00ffff88, 0 0 40px #ff00ff66;
    transition: 0.3s;
  }

  .button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px #00ffff, 0 0 80px #ff00ff;
  }

  /* Przyciski powrotu */
  .back-button {
    background: linear-gradient(135deg, #0066ff, #00ccff);
    box-shadow: 0 0 20px #00aaff88, 0 0 40px #0088ff66;
  }

</style>
</head>

<body>

<div class="container">
  <h1>📜 Wybierz regulamin</h1>

  <a href="regulaminsurvivaldzialki.html" class="button">🏡 Działki</a>
  <a href="regulaminchunklock.html" class="button">🌍 CHUNKLOCK</a>

  <br>

  <a href="index.html" class="button back-button">← Powrót</a>
</div>

<script>
/* GENEROWANIE NEONOWYCH CZĄSTEK IDENTYCZNYCH JAK NA STRONIE GŁÓWNEJ */
function spawnFloatingParticles() {
  for (let i = 0; i < 80; i++) {
    const s = document.createElement("div");
    s.className = "float-star";

    const size = Math.random() * 3 + 2;
    s.style.width = size + "px";
    s.style.height = size + "px";

    s.style.left = Math.random() * window.innerWidth + "px";
    s.style.top = Math.random() * window.innerHeight + "px";

    s.style.animationDuration = (10 + Math.random() * 12) + "s";
    s.style.opacity = Math.random() * 0.6 + 0.3;

    document.body.appendChild(s);
  }
}

spawnFloatingParticles();
</script>

</body>
</html>
