<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BOSSMAN</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Orbitron',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    background:radial-gradient(circle at center,#000010 0%,#020020 100%);
    position:relative;
    overflow:hidden;
}

/* Tło gwiazd */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity:.25;
    pointer-events:none;
}

/* Panel */
.panel{
    position:relative;
    z-index:2;
    text-align:center;
    background:rgba(0,0,30,.75);
    padding:45px;
    border-radius:35px;
    backdrop-filter:blur(12px);
    box-shadow:
        0 0 40px #00ffff,
        0 0 90px #ff00ff;
    width:min(92%,700px);
    animation:floatPanel 5s ease-in-out infinite;
}

@keyframes floatPanel{
    50%{
        transform:translateY(-8px);
    }
}

/* Avatar */
.avatar{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #00ffff;
    box-shadow:
        0 0 30px #00ffff,
        0 0 70px #ff00ff;
    margin-bottom:25px;
}

/* Logo */
h1{
    font-size:4rem;
    background:linear-gradient(90deg,#00ffff,#ff00ff,#00ffff);
    background-size:300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:gradientMove 6s linear infinite;
}

@keyframes gradientMove{
    from{background-position:0%;}
    to{background-position:300%;}
}

/* Podpis */
.subtitle{
    margin-top:10px;
    color:#00ffff;
    text-shadow:0 0 10px #00ffff;
    margin-bottom:20px;
}

/* Status */
.live{
    display:inline-block;
    margin-bottom:30px;
    padding:10px 20px;
    border-radius:20px;
    background:rgba(255,0,0,.15);
    border:1px solid #ff4444;
    color:#ff6666;
    box-shadow:0 0 15px #ff4444;
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    50%{
        opacity:.5;
    }
}

/* Przyciski */
.buttons{
    display:flex;
    flex-direction:column;
    gap:18px;
    align-items:center;
}

.btn{
    position:relative;
    overflow:hidden;
    width:320px;
    text-align:center;
    text-decoration:none;
    color:white;
    font-weight:bold;
    padding:16px 28px;
    border-radius:18px;
    background:linear-gradient(135deg,#00ffff,#ff00ff);
    box-shadow:
        0 0 20px #00ffff,
        0 0 40px #ff00ff;
    transition:.3s;
}

.btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.3),
        transparent
    );
    transition:.6s;
}

.btn:hover::before{
    left:100%;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:
        0 0 40px #00ffff,
        0 0 80px #ff00ff;
}

/* Stopka */
footer{
    margin-top:25px;
    color:#888;
    z-index:2;
    font-size:.9rem;
}
</style>
</head>
<body>

<div class="panel">

    <!-- Podmień avatar.jpg na własne zdjęcie -->
    <img src="avatar.jpg" alt="Bossman" class="avatar">

    <h1>BOSSMAN</h1>

    <p class="subtitle">
        Streamer • Minecraft • TikTok
    </p>

    <div class="live">
        🔴 AKTUALNIE ONLINE
    </div>

    <div class="buttons">

        <a href="https://www.tiktok.com/@streetbosspl"
           target="_blank"
           class="btn">
            🎵 TIKTOK
        </a>

        <a href="https://discord.gg/rkZHFWjqhn"
           target="_blank"
           class="btn">
            💬 DISCORD
        </a>

        <a href="https://tipply.pl/@BSCMC.PL"
           target="_blank"
           class="btn">
            ☕ WSPARCIE
        </a>

    </div>

</div>

<footer>
    © 2026 BOSSMAN
</footer>

</body>
</html>
