<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BOSSMAN</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Orbitron',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    background:radial-gradient(circle at center,#000010 0%,#020020 100%);
    position:relative;
    overflow-x:hidden;
}

/* Gwiazdy */
#particles-js{
    position:fixed;
    inset:0;
    z-index:0;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity:.25;
    pointer-events:none;
}

/* Panel */
.panel{
    position:relative;
    z-index:2;
    text-align:center;
    background:rgba(0,0,30,.75);
    padding:50px;
    border-radius:35px;
    backdrop-filter:blur(12px);
    box-shadow:
        0 0 40px #00ffff,
        0 0 90px #ff00ff;
    width:min(92%,750px);

    animation:
        fadeIn 1s ease,
        floatPanel 5s ease-in-out infinite;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(.85);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes floatPanel{
    50%{
        transform:translateY(-8px);
    }
}

/* Logo */
.avatar{
    width:190px;
    height:190px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #00ffff;
    box-shadow:
        0 0 30px #00ffff,
        0 0 70px #ff00ff;
    margin-bottom:25px;
}

/* BOSSMAN */
h1{
    font-size:4rem;
    background:linear-gradient(
        90deg,
        #00ffff,
        #ff00ff,
        #00ffff
    );
    background-size:300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:gradientMove 6s linear infinite;
}

@keyframes gradientMove{
    from{
        background-position:0%;
    }
    to{
        background-position:300%;
    }
}

.subtitle{
    margin-top:12px;
    margin-bottom:20px;
    font-size:1.1rem;
    font-weight:700;
    letter-spacing:3px;
    color:#00ffff;
    text-transform:uppercase;
    text-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #ff00ff;
}

/* Status */
.live{
    display:inline-block;
    margin-bottom:30px;
    padding:12px 24px;
    border-radius:25px;
    background:rgba(255,0,0,.15);
    border:1px solid #ff4444;
    color:#ff6666;
    box-shadow:0 0 20px #ff4444;
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    50%{
        opacity:.5;
    }
}

/* Przyciski */
.buttons{
    display:flex;
    flex-direction:column;
    gap:18px;
    align-items:center;
}

.btn{
    position:relative;
    overflow:hidden;
    width:340px;
    text-align:center;
    text-decoration:none;
    color:white;
    font-weight:bold;
    padding:17px 30px;
    border-radius:18px;

    background:linear-gradient(
        135deg,
        #00ffff,
        #ff00ff
    );

    box-shadow:
        0 0 20px #00ffff,
        0 0 40px #ff00ff;

    transition:.3s;
}

.btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.3),
        transparent
    );
    transition:.6s;
}

.btn:hover::before{
    left:100%;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:
        0 0 40px #00ffff,
        0 0 80px #ff00ff;
}

/* Community */
.community{
    margin-top:35px;
    padding:20px;
    border-radius:20px;

    background:rgba(0,255,255,.08);

    border:1px solid #00ffff;

    box-shadow:
        0 0 20px rgba(0,255,255,.4);

    line-height:1.8;
}

/* Stopka */
footer{
    margin-top:25px;
    color:#888;
    z-index:2;
    font-size:.9rem;
}

@media(max-width:600px){

    h1{
        font-size:2.8rem;
    }

    .btn{
        width:100%;
    }

    .panel{
        padding:35px 25px;
    }

    .avatar{
        width:150px;
        height:150px;
    }
}
</style>
</head>
<body>

<div id="particles-js"></div>

<div class="panel">

    <img
        src="https://i.postimg.cc/kMN5P3gf/LOGO-BOSSMAN.png"
        alt="BOSSMAN"

    <h1>BOSSMAN</h1>

    <p class="subtitle">

    <div class="buttons">

        <a href="https://www.tiktok.com/@streetbosspl"

        </a>

        <a href="https://discord.gg/rkZHFWjqhn"

        </a>

        <a href="https://www.youtube.com/@BSCMC_PL"
           target="_blank"
           class="btn">
            ▶️ YOUTUBE
        </a>

        <a href="https://kick.com/bossman-ml"
           target="_blank"
           class="btn">
            🟢 KICK
        </a>

        <a href="https://tipply.pl/@BSCMC.PL"
           target="_blank"
           class="btn">
            ☕ WSPARCIE
        </a>

        <a href="https://www.youtube.com/watch?v=9lfeBJS3W9U"
           target="_blank"
           class="btn">
            🎵 MUZYKA
        </a>

    </div>

    <div class="community">
        👑 DOŁĄCZ DO SPOŁECZNOŚCI BOSSMAN 👑
        <br><br>
        🔥 TikTok • Discord • YouTube • Kick
        <br>
        🎮 Gaming • Live • Community
    </div>

</div>

<footer>
    © 2026 BOSSMAN
</footer>

<script>
particlesJS("particles-js", {
    particles: {

</script>

</body>
</html>
